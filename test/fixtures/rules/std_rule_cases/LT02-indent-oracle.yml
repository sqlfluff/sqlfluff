rule: LT02

# Test cases for conditionals and loops indentation scenarios
test_fail_oracle_if_clause_indentation:
  fail_str: |
    BEGIN
    IF 1 > 0 THEN
    DBMS_OUTPUT.PUT_LINE('condition met');
    ELSIF 2 > 1 THEN
    DBMS_OUTPUT.PUT_LINE('alternative met');
    ELSE
    DBMS_OUTPUT.PUT_LINE('default case');
    END IF;
    END;
  fix_str: |
    BEGIN
        IF 1 > 0 THEN
            DBMS_OUTPUT.PUT_LINE('condition met');
        ELSIF 2 > 1 THEN
            DBMS_OUTPUT.PUT_LINE('alternative met');
        ELSE
            DBMS_OUTPUT.PUT_LINE('default case');
        END IF;
    END;
  configs:
    core:
      dialect: oracle

test_fail_oracle_for_loop_indentation:
  fail_str: |
    BEGIN
    FOR i IN 1..10 LOOP
    DBMS_OUTPUT.PUT_LINE('Counter: ' || i);
    IF i < 5 THEN
    DBMS_OUTPUT.PUT_LINE('Small number');
    ELSE
    DBMS_OUTPUT.PUT_LINE('Large number');
    END IF;
    END LOOP;
    END;
  fix_str: |
    BEGIN
        FOR i IN 1..10 LOOP
            DBMS_OUTPUT.PUT_LINE('Counter: ' || i);
            IF i < 5 THEN
                DBMS_OUTPUT.PUT_LINE('Small number');
            ELSE
                DBMS_OUTPUT.PUT_LINE('Large number');
            END IF;
        END LOOP;
    END;
  configs:
    core:
      dialect: oracle

test_fail_oracle_nested_control_structures:
  fail_str: |
    BEGIN
    IF 1 > 0 THEN
    FOR i IN 1..3 LOOP
    IF i = 2 THEN
    DBMS_OUTPUT.PUT_LINE('Found two: ' || i);
    ELSIF i = 1 THEN
    DBMS_OUTPUT.PUT_LINE('Found one: ' || i);
    ELSE
    DBMS_OUTPUT.PUT_LINE('Found other: ' || i);
    END IF;
    END LOOP;
    END IF;
    END;
  fix_str: |
    BEGIN
        IF 1 > 0 THEN
            FOR i IN 1..3 LOOP
                IF i = 2 THEN
                    DBMS_OUTPUT.PUT_LINE('Found two: ' || i);
                ELSIF i = 1 THEN
                    DBMS_OUTPUT.PUT_LINE('Found one: ' || i);
                ELSE
                    DBMS_OUTPUT.PUT_LINE('Found other: ' || i);
                END IF;
            END LOOP;
        END IF;
    END;
  configs:
    core:
      dialect: oracle

test_fail_oracle_simple_block_indentation:
  fail_str: |
    BEGIN
    FOR i IN 1..5 LOOP
    IF i < 3 THEN
    DBMS_OUTPUT.PUT_LINE('Small: ' || i);
    ELSE
    DBMS_OUTPUT.PUT_LINE('Large: ' || i);
    END IF;
    END LOOP;
    END;
  fix_str: |
    BEGIN
        FOR i IN 1..5 LOOP
            IF i < 3 THEN
                DBMS_OUTPUT.PUT_LINE('Small: ' || i);
            ELSE
                DBMS_OUTPUT.PUT_LINE('Large: ' || i);
            END IF;
        END LOOP;
    END;
  configs:
    core:
      dialect: oracle

test_pass_oracle_proper_indentation:
  pass_str: |
    BEGIN
        FOR i IN 1..3 LOOP
            IF i < 2 THEN
                DBMS_OUTPUT.PUT_LINE('Small: ' || i);
            ELSE
                DBMS_OUTPUT.PUT_LINE('Large: ' || i);
            END IF;
        END LOOP;
    END;
  configs:
    core:
      dialect: oracle

# Test cases for declare blocks indentation scenarios
test_fail_declare_block_basic_declarations:
  fail_str: |
    DECLARE
    v_name VARCHAR2(50);
    v_count NUMBER;
    c_max_count CONSTANT NUMBER;
    c_pi CONSTANT NUMBER;
    BEGIN
      NULL;
    END;
  fix_str: |
    DECLARE
        v_name VARCHAR2(50);
        v_count NUMBER;
        c_max_count CONSTANT NUMBER;
        c_pi CONSTANT NUMBER;
    BEGIN
        NULL;
    END;
  configs:
    core:
      dialect: oracle

test_fail_declare_block_mixed_declarations:
  fail_str: |
    DECLARE
    v_name VARCHAR2(50);
    TYPE emp_record IS RECORD (
    emp_id NUMBER,
    name VARCHAR2(100)
    );
    v_emp emp_record;
    c_max CONSTANT NUMBER;
    BEGIN
      NULL;
    END;
  fix_str: |
    DECLARE
        v_name VARCHAR2(50);
        TYPE emp_record IS RECORD (
            emp_id NUMBER,
            name VARCHAR2(100)
        );
        v_emp emp_record;
        c_max CONSTANT NUMBER;
    BEGIN
        NULL;
    END;
  configs:
    core:
      dialect: oracle

# Test cases for Oracle IS/AS block indentation scenarios
test_oracle_procedure_indentation_after_as:
  # Test CREATE PROCEDURE indentation after AS keyword
  fail_str: |
    CREATE OR REPLACE PROCEDURE test_procedure AS
    v_counter NUMBER;
    v_name VARCHAR2(50);
    CURSOR emp_cursor IS
    SELECT employee_id, first_name FROM employees;
    BEGIN
    NULL;
    END test_procedure;
  fix_str: |
    CREATE OR REPLACE PROCEDURE test_procedure AS
        v_counter NUMBER;
        v_name VARCHAR2(50);
        CURSOR emp_cursor IS
            SELECT employee_id, first_name FROM employees;
    BEGIN
        NULL;
    END test_procedure;
  configs:
    core:
      dialect: oracle

test_oracle_function_indentation_after_as:
  # Test CREATE FUNCTION indentation after AS keyword
  fail_str: |
    CREATE OR REPLACE FUNCTION test_function(p_value NUMBER) RETURN NUMBER AS
    v_result NUMBER;
    CURSOR calc_cursor IS
    SELECT value FROM test_table;
    BEGIN
    RETURN 1;
    END test_function;
  fix_str: |
    CREATE OR REPLACE FUNCTION test_function(p_value NUMBER) RETURN NUMBER AS
        v_result NUMBER;
        CURSOR calc_cursor IS
            SELECT value FROM test_table;
    BEGIN
        RETURN 1;
    END test_function;
  configs:
    core:
      dialect: oracle

test_oracle_package_indentation_after_as:
  # Test CREATE PACKAGE indentation after AS keyword
  fail_str: |
    CREATE OR REPLACE PACKAGE test_package AS
    CURSOR pkg_cursor IS
    SELECT id, name FROM employees;
    PROCEDURE pkg_procedure(p_id NUMBER);
    FUNCTION pkg_function RETURN NUMBER;
    END test_package;
  fix_str: |
    CREATE OR REPLACE PACKAGE test_package AS
        CURSOR pkg_cursor IS
            SELECT id, name FROM employees;
        PROCEDURE pkg_procedure(p_id NUMBER);
        FUNCTION pkg_function RETURN NUMBER;
    END test_package;
  configs:
    core:
      dialect: oracle

test_oracle_package_body_indentation_after_as:
  # Test CREATE PACKAGE BODY indentation after AS keyword
  fail_str: |
    CREATE OR REPLACE PACKAGE BODY test_package AS
    v_private_var NUMBER;
    CURSOR private_cursor IS
    SELECT employee_id FROM employees;
    PROCEDURE pkg_procedure(p_id NUMBER) AS
    v_local NUMBER;
    BEGIN
    NULL;
    END pkg_procedure;
    END test_package;
  fix_str: |
    CREATE OR REPLACE PACKAGE BODY test_package AS
        v_private_var NUMBER;
        CURSOR private_cursor IS
            SELECT employee_id FROM employees;
        PROCEDURE pkg_procedure(p_id NUMBER) AS
            v_local NUMBER;
        BEGIN
            NULL;
        END pkg_procedure;
    END test_package;
  configs:
    core:
      dialect: oracle

test_oracle_type_body_indentation_after_as:
  # Test CREATE TYPE BODY indentation after AS keyword
  fail_str: |
    CREATE OR REPLACE TYPE BODY test_type AS
    MEMBER FUNCTION calculate_power RETURN NUMBER AS
    v_result NUMBER;
    BEGIN
    RETURN id;
    END calculate_power;
    END;
  fix_str: |
    CREATE OR REPLACE TYPE BODY test_type AS
        MEMBER FUNCTION calculate_power RETURN NUMBER AS
            v_result NUMBER;
        BEGIN
            RETURN id;
        END calculate_power;
    END;
  configs:
    core:
      dialect: oracle

test_oracle_nested_indentation_scenarios:
  # Test nested IS/AS indentation scenarios
  fail_str: |
    CREATE OR REPLACE PACKAGE BODY complex_package AS
    v_global_var NUMBER;
    CURSOR global_cursor IS
    SELECT * FROM all_tables;
    PROCEDURE nested_proc AS
    v_local_var NUMBER;
    CURSOR local_cursor IS
    SELECT table_name FROM user_tables;
    FUNCTION inner_func RETURN NUMBER AS
    v_inner_var NUMBER;
    BEGIN
    RETURN 42;
    END inner_func;
    BEGIN
    NULL;
    END nested_proc;
    END complex_package;
  fix_str: |
    CREATE OR REPLACE PACKAGE BODY complex_package AS
        v_global_var NUMBER;
        CURSOR global_cursor IS
            SELECT * FROM all_tables;
        PROCEDURE nested_proc AS
            v_local_var NUMBER;
            CURSOR local_cursor IS
                SELECT table_name FROM user_tables;
            FUNCTION inner_func RETURN NUMBER AS
                v_inner_var NUMBER;
            BEGIN
                RETURN 42;
            END inner_func;
        BEGIN
            NULL;
        END nested_proc;
    END complex_package;
  configs:
    core:
      dialect: oracle

# Test cases for exception block indentation scenarios
test_fail_oracle_exception_block_basic:
  # Test basic exception block indentation
  fail_str: |
    DECLARE
    v_dividend NUMBER := 10;
    v_divisor NUMBER := 0;
    v_result NUMBER;
    BEGIN
    v_result := v_dividend / v_divisor;
    DBMS_OUTPUT.PUT_LINE('Result: ' || v_result);
    EXCEPTION
    WHEN ZERO_DIVIDE THEN
    DBMS_OUTPUT.PUT_LINE('Error: Division by zero!');
    WHEN OTHERS THEN
    DBMS_OUTPUT.PUT_LINE('Unexpected error: ' || SQLERRM);
    END;
  fix_str: |
    DECLARE
        v_dividend NUMBER := 10;
        v_divisor NUMBER := 0;
        v_result NUMBER;
    BEGIN
        v_result := v_dividend / v_divisor;
        DBMS_OUTPUT.PUT_LINE('Result: ' || v_result);
        EXCEPTION
            WHEN ZERO_DIVIDE THEN
                DBMS_OUTPUT.PUT_LINE('Error: Division by zero!');
            WHEN OTHERS THEN
                DBMS_OUTPUT.PUT_LINE('Unexpected error: ' || SQLERRM);
    END;
  configs:
    core:
      dialect: oracle

test_fail_oracle_exception_block_simple:
  # Test simple exception block without DECLARE
  fail_str: |
    BEGIN
    SELECT 1 FROM dual;
    EXCEPTION
    WHEN NO_DATA_FOUND THEN
    DBMS_OUTPUT.PUT_LINE('No data');
    WHEN OTHERS THEN
    DBMS_OUTPUT.PUT_LINE('Error');
    END;
  fix_str: |
    BEGIN
        SELECT 1 FROM dual;
        EXCEPTION
            WHEN NO_DATA_FOUND THEN
                DBMS_OUTPUT.PUT_LINE('No data');
            WHEN OTHERS THEN
                DBMS_OUTPUT.PUT_LINE('Error');
    END;
  configs:
    core:
      dialect: oracle

test_fail_oracle_exception_block_nested:
  # Test nested exception blocks
  fail_str: |
    DECLARE
    v_value NUMBER;
    BEGIN
    BEGIN
    v_value := 1;
    EXCEPTION
    WHEN OTHERS THEN
    DBMS_OUTPUT.PUT_LINE('Inner exception');
    END;
    EXCEPTION
    WHEN OTHERS THEN
    DBMS_OUTPUT.PUT_LINE('Outer exception');
    END;
  fix_str: |
    DECLARE
        v_value NUMBER;
    BEGIN
        BEGIN
            v_value := 1;
            EXCEPTION
                WHEN OTHERS THEN
                    DBMS_OUTPUT.PUT_LINE('Inner exception');
        END;
        EXCEPTION
            WHEN OTHERS THEN
                DBMS_OUTPUT.PUT_LINE('Outer exception');
    END;
  configs:
    core:
      dialect: oracle

test_fail_oracle_exception_block_multiple_handlers:
  # Test exception block with multiple handlers
  fail_str: |
    BEGIN
    NULL;
    EXCEPTION
    WHEN ZERO_DIVIDE THEN
    DBMS_OUTPUT.PUT_LINE('Division by zero');
    WHEN INVALID_NUMBER THEN
    DBMS_OUTPUT.PUT_LINE('Invalid number');
    WHEN VALUE_ERROR THEN
    DBMS_OUTPUT.PUT_LINE('Value error');
    WHEN OTHERS THEN
    DBMS_OUTPUT.PUT_LINE('Other error');
    END;
  fix_str: |
    BEGIN
        NULL;
        EXCEPTION
            WHEN ZERO_DIVIDE THEN
                DBMS_OUTPUT.PUT_LINE('Division by zero');
            WHEN INVALID_NUMBER THEN
                DBMS_OUTPUT.PUT_LINE('Invalid number');
            WHEN VALUE_ERROR THEN
                DBMS_OUTPUT.PUT_LINE('Value error');
            WHEN OTHERS THEN
                DBMS_OUTPUT.PUT_LINE('Other error');
    END;
  configs:
    core:
      dialect: oracle

test_pass_oracle_exception_block_proper_indentation:
  # Test properly indented exception block
  pass_str: |
    BEGIN
        v_result := v_dividend / v_divisor;
        DBMS_OUTPUT.PUT_LINE('Result: ' || v_result);
        EXCEPTION
            WHEN ZERO_DIVIDE THEN
                DBMS_OUTPUT.PUT_LINE('Error: Division by zero!');
            WHEN OTHERS THEN
                DBMS_OUTPUT.PUT_LINE('Unexpected error: ' || SQLERRM);
    END;
  configs:
    core:
      dialect: oracle

# Test cases for TABLESPACE / STORAGE clause indentation
test_fail_oracle_storage_clause_missing_indentation:
  # STORAGE clause contents must be indented inside the parentheses
  fail_str: |
    CREATE TABLE s1.t_storage (
        id NUMBER(10) NOT NULL
    )
    TABLESPACE data_ts
    STORAGE (
    INITIAL 655K
    NEXT 655K
    MINEXTENTS 1
    MAXEXTENTS UNLIMITED
    BUFFER_POOL DEFAULT
    )
    LOGGING;
  fix_str: |
    CREATE TABLE s1.t_storage (
        id NUMBER(10) NOT NULL
    )
    TABLESPACE data_ts
    STORAGE (
        INITIAL 655K
        NEXT 655K
        MINEXTENTS 1
        MAXEXTENTS UNLIMITED
        BUFFER_POOL DEFAULT
    )
    LOGGING;
  configs:
    core:
      dialect: oracle

test_pass_oracle_storage_clause_indentation:
  # Correctly indented STORAGE clause passes LT02
  pass_str: |
    CREATE TABLE s1.t_storage (
        id NUMBER(10) NOT NULL
    )
    TABLESPACE data_ts
    STORAGE (
        INITIAL 655K
        NEXT 655K
        MINEXTENTS 1
        MAXEXTENTS UNLIMITED
        PCTINCREASE 0
        FREELISTS 1
        FREELIST GROUPS 1
        BUFFER_POOL DEFAULT
    )
    LOGGING
    NOPARALLEL;
  configs:
    core:
      dialect: oracle

test_fail_oracle_create_index_storage_clause_indentation:
  # STORAGE clause contents inside CREATE INDEX must be indented
  fail_str: |
    CREATE INDEX s1.t_full_idx ON s1.t (col1, col2)
    TABLESPACE idx_ts
    NOLOGGING
    PCTFREE 10
    INITRANS 2
    MAXTRANS 255
    STORAGE (
    INITIAL 655K
    NEXT 655K
    MINEXTENTS 1
    MAXEXTENTS UNLIMITED
    BUFFER_POOL DEFAULT
    )
    PARALLEL 8
    NOCOMPRESS
    VISIBLE;
  fix_str: |
    CREATE INDEX s1.t_full_idx ON s1.t (col1, col2)
    TABLESPACE idx_ts
    NOLOGGING
    PCTFREE 10
    INITRANS 2
    MAXTRANS 255
    STORAGE (
        INITIAL 655K
        NEXT 655K
        MINEXTENTS 1
        MAXEXTENTS UNLIMITED
        BUFFER_POOL DEFAULT
    )
    PARALLEL 8
    NOCOMPRESS
    VISIBLE;
  configs:
    core:
      dialect: oracle

test_pass_oracle_create_index_storage_clause_indentation:
  # Correctly indented STORAGE clause in CREATE INDEX passes LT02
  pass_str: |
    CREATE UNIQUE INDEX s1.filter_instkeytype_idx
    ON s1.filter (institution_id, filterkey, filtertype_id)
    PCTFREE 10
    INITRANS 2
    MAXTRANS 255
    TABLESPACE idx_ts
    STORAGE (
        INITIAL 140K
        NEXT 360K
        MINEXTENTS 1
        MAXEXTENTS UNLIMITED
        PCTINCREASE 50
        FREELISTS 1
        FREELIST GROUPS 1
        BUFFER_POOL DEFAULT
    )
    NOLOGGING
    PARALLEL 4;
  configs:
    core:
      dialect: oracle

# Test cases for USING INDEX inline CREATE INDEX indentation
test_fail_oracle_using_index_inline_wrong_indent:
  # USING INDEX clause and its bracketed inline CREATE INDEX must be
  # indented at the same level as the enclosing CONSTRAINT keyword.
  fail_str: |
    CREATE TABLE t_pk_inline (
        id NUMBER,
        CONSTRAINT pk_t_pk_inline PRIMARY KEY (id)
    USING INDEX (CREATE INDEX pk_t_pk_inline_i ON t_pk_inline (id))
    );
  fix_str: |
    CREATE TABLE t_pk_inline (
        id NUMBER,
        CONSTRAINT pk_t_pk_inline PRIMARY KEY (id)
        USING INDEX (CREATE INDEX pk_t_pk_inline_i ON t_pk_inline (id))
    );
  configs:
    core:
      dialect: oracle

test_pass_oracle_using_index_inline_basic:
  # Single-line inline CREATE INDEX correctly indented inside PRIMARY KEY.
  pass_str: |
    CREATE TABLE t_pk_inline (
        id NUMBER,
        CONSTRAINT pk_t_pk_inline PRIMARY KEY (id)
        USING INDEX (CREATE INDEX pk_t_pk_inline_i ON t_pk_inline (id))
    );
  configs:
    core:
      dialect: oracle

test_pass_oracle_using_index_inline_unique:
  # Single-line inline CREATE UNIQUE INDEX for a UNIQUE constraint.
  pass_str: |
    CREATE TABLE t_uq_inline (
        code VARCHAR2(10),
        CONSTRAINT uq UNIQUE (code)
        USING INDEX (CREATE UNIQUE INDEX uq_i ON t_uq_inline (code))
    );
  configs:
    core:
      dialect: oracle

test_fail_oracle_using_index_inline_multiline_wrong_indent:
  # Inline CREATE INDEX spanning multiple lines: the body inside the
  # outer parentheses must be indented deeper.
  fail_str: |
    CREATE TABLE t_pk_inline_multi (
        id NUMBER,
        CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
    CREATE INDEX pk_i ON t_pk_inline_multi (id)
    TABLESPACE idx_ts
    NOLOGGING
        )
    );
  fix_str: |
    CREATE TABLE t_pk_inline_multi (
        id NUMBER,
        CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
            CREATE INDEX pk_i ON t_pk_inline_multi (id)
            TABLESPACE idx_ts
            NOLOGGING
        )
    );
  configs:
    core:
      dialect: oracle

test_pass_oracle_using_index_inline_multiline:
  # Correctly-indented multi-line inline CREATE INDEX passes LT02.
  pass_str: |
    CREATE TABLE t_pk_inline_multi (
        id NUMBER,
        CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
            CREATE INDEX pk_i ON t_pk_inline_multi (id)
            TABLESPACE idx_ts
            PCTFREE 10
            NOLOGGING
        )
    );
  configs:
    core:
      dialect: oracle

test_fail_oracle_using_index_inline_storage_wrong_indent:
  # STORAGE inside the inline CREATE INDEX must be indented inside its
  # own parentheses.
  fail_str: |
    CREATE TABLE t_pk_inline_storage (
        id NUMBER,
        CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
            CREATE INDEX pk_i ON t_pk_inline_storage (id)
            TABLESPACE idx_ts
            STORAGE (
    INITIAL 256K
    NEXT 256K
    MAXEXTENTS UNLIMITED
    BUFFER_POOL DEFAULT
            )
            NOLOGGING
        )
    );
  fix_str: |
    CREATE TABLE t_pk_inline_storage (
        id NUMBER,
        CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
            CREATE INDEX pk_i ON t_pk_inline_storage (id)
            TABLESPACE idx_ts
            STORAGE (
                INITIAL 256K
                NEXT 256K
                MAXEXTENTS UNLIMITED
                BUFFER_POOL DEFAULT
            )
            NOLOGGING
        )
    );
  configs:
    core:
      dialect: oracle

test_pass_oracle_using_index_inline_storage:
  # Correctly-indented STORAGE clause inside inline CREATE INDEX passes LT02.
  pass_str: |
    CREATE TABLE t_pk_inline_storage (
        id NUMBER,
        CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
            CREATE INDEX pk_i ON t_pk_inline_storage (id)
            TABLESPACE idx_ts
            STORAGE (
                INITIAL 256K
                NEXT 256K
                MAXEXTENTS UNLIMITED
                BUFFER_POOL DEFAULT
            )
            NOLOGGING
        )
    );
  configs:
    core:
      dialect: oracle

test_fail_oracle_using_index_inline_multi_constraint_wrong_indent:
  # Table with multiple constraints: each USING INDEX clause (whether a
  # named index or inline CREATE INDEX) must sit at the constraint indent level.
  fail_str: |
    CREATE TABLE t_multi_constraints (
        id NUMBER,
        code VARCHAR2(10),
    CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
    CREATE INDEX pk_i ON t_multi_constraints (id)
    TABLESPACE idx_ts
        ),
        CONSTRAINT uq UNIQUE (code)
    USING INDEX uq_idx
    );
  fix_str: |
    CREATE TABLE t_multi_constraints (
        id NUMBER,
        code VARCHAR2(10),
        CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
            CREATE INDEX pk_i ON t_multi_constraints (id)
            TABLESPACE idx_ts
        ),
        CONSTRAINT uq UNIQUE (code)
        USING INDEX uq_idx
    );
  configs:
    core:
      dialect: oracle

test_pass_oracle_using_index_inline_multi_constraint:
  # Multiple constraints with mixed USING INDEX forms, all correctly indented.
  pass_str: |
    CREATE TABLE t_multi_constraints (
        id NUMBER,
        code VARCHAR2(10),
        CONSTRAINT pk PRIMARY KEY (id)
        USING INDEX (
            CREATE INDEX pk_i ON t_multi_constraints (id)
            TABLESPACE idx_ts
        ),
        CONSTRAINT uq UNIQUE (code)
        USING INDEX uq_idx
    );
  configs:
    core:
      dialect: oracle
