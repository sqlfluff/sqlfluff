rule: LT03

passes_shortcut_fallthrough_alone:
  # When line_position = "alone", _check_trail_lead_shortcut returns False
  # (defers to full reflow) since "alone" is not "leading" or "trailing".
  # An inline := satisfies the alone constraint, so this is a pass.
  # This covers the return False fallback in _check_trail_lead_shortcut.
  pass_str: |
    LET MY_VAR := SOME_VALUE;
  configs:
    layout:
      type:
        assignment_operator:
          line_position: alone
    core:
      dialect: snowflake

passes_on_before_default:
  pass_str: |
    select
        a
        + b
    from foo

fails_on_after_default:
  fail_str: |
    select
        a +
        b
    from foo
  fix_str: |
    select
        a
        + b
    from foo

fails_on_after_default_on_and:
  fail_str: |
    select
        a AND
        b
    from foo
  fix_str: |
    select
        a
        AND b
    from foo

fails_on_after_with_comment_order_preserved:
  fail_str: |
    select
        a AND
        -- comment1!
        -- comment2!
        b
    from foo
  fix_str: |
    select
        a
        -- comment1!
        -- comment2!
        AND b
    from foo

passes_on_before_explicit:
  pass_str: |
    select
        a
        + b
    from foo
  configs: &operator_after
    layout:
      type:
        binary_operator:
          line_position: leading
        comparison_operator:
          line_position: leading


fails_on_after_explicit:
  fail_str: |
    select
        a +
        b
    from foo
  fix_str: |
    select
        a
        + b
    from foo
  configs: *operator_after

fails_on_after_multi_explicit:
  fail_str: |
    SELECT
        *
    FROM
      foo
    WHERE
        (g > z) AND
        (
          (a = 'a' AND b = 'b') OR
          (a = 'a' AND b = 'e') OR
          (a = 'c' AND b = 'g') OR
          (a = 'c' AND b = 'e') OR
          1 = 1
        );
  fix_str: |
    SELECT
        *
    FROM
      foo
    WHERE
        (g > z)
        AND (
          (a = 'a' AND b = 'b')
          OR (a = 'a' AND b = 'e')
          OR (a = 'c' AND b = 'g')
          OR (a = 'c' AND b = 'e')
          OR 1 = 1
        );
  configs: *operator_after

fails_on_before_override:
  fail_str: |
    select
        a
        + b
    from foo
  fix_str: |
    select
        a +
        b
    from foo
  configs: &operator_before
    layout:
      type:
        binary_operator:
          line_position: trailing
        comparison_operator:
          line_position: trailing

passes_on_after_override:
  pass_str: |
    select
        a +
        b
    from foo
  configs: *operator_before

fails_on_before_override_with_comment_order:
  fail_str: |
    select
        a -- comment1!
        -- comment2!
        -- comment3!
        + b
    from foo
  fix_str: |
    select
        a + -- comment1!
        -- comment2!
        -- comment3!
        b
    from foo
  configs: *operator_before

fails_on_after_override_with_comment_order:
  fail_str: |
    select
        a + -- comment1!
        -- comment2!
        -- comment3!
        b
    from foo
  fix_str: |
    select
        a -- comment1!
        -- comment2!
        -- comment3!
        + b
    from foo
  configs: *operator_after

# Fix the different variations of problematic comments in a leading case.
fails_leading_with_comments:
  fail_str: |
    SELECT
      1 +
      /* foo */ 2,
      1 + -- foo
      2,
      1 /* foo */ +
      2,
      1 /* foo */ + -- foo
      /* foo */ 2
  fix_str: |
    SELECT
      1
      /* foo */ + 2,
      1 -- foo
      + 2,
      1 /* foo */
      + 2,
      1 /* foo */ -- foo
      /* foo */ + 2
  configs: *operator_after

# Fix the different variations of problematic comments in a trailing case.
fails_trailing_with_comments:
  fail_str: |
    SELECT
      1
      + /* foo */ 2,
      1 -- foo
      + 2,
      1
      /* foo */ + 2,
      1 -- foo
      /* foo */ + /* foo */ 2
  fix_str: |
    SELECT
      1 +
      /* foo */ 2,
      1 + -- foo
      2,
      1 +
      /* foo */ 2,
      1 + -- foo
      /* foo */ /* foo */ 2
  configs: *operator_before

passes_templated_newline:
  pass_str: |
    {% macro binary_literal(expression) %}
      X'{{ expression }}'
    {% endmacro %}

    select
        *
    from my_table
    where
        a = {{ binary_literal("0000") }}

fails_templated_code_non_templated_newline:
  fail_str: |
    {% macro binary_literal(expression) %}
      X'{{ expression }}'
    {% endmacro %}

    select
        *
    from my_table
    where
        a =
            {{ binary_literal("0000") }}

passes_operator_alone_on_line:
  # Special case: An operator on a line by itself is always okay.
  pass_str: |
    SELECT
      'asdf'
      ||
      'jklm'

passes_leading_align_following_binary_operator:
  # Ensure leading:align-following doesn't crash on binary operators
  pass_str: |
    select
        a
        + b
    from foo
  configs:
    layout:
      type:
        binary_operator:
          line_position: "leading:align-following"

passes_leading_align_following_comparison_operator:
  # Ensure leading:align-following doesn't crash on comparison operators
  pass_str: |
    select *
    from foo
    where
        a
        = 1
  configs:
    layout:
      type:
        comparison_operator:
          line_position: "leading:align-following"

fixes_tuple_error_issue:
  # https://github.com/sqlfluff/sqlfluff/issues/4184
  # NB: This one isn't fixable.
  fail_str: |
    select * from foo
    where c is not null and -- comment
        {% if true -%}a >= b and
        -- comment.
        {% endif %}
        true
  configs:
    indentation:
      template_blocks_indent: false

# Assignment operator (:=) tests (Oracle PL/SQL)

# --- trailing config (tolerates standalone := on its own line) ---

assignment_operator_trailing_passes_same_line:
  # := on the same line as the variable is fine
  pass_str: |
    MY_VAR := SOME_VALUE;
  configs: &assignment_trailing
    layout:
      type:
        assignment_operator:
          line_position: trailing
    core:
      dialect: oracle

assignment_operator_trailing_passes_truly_trailing:
  # := at end of first line (before newline) is correct for trailing
  pass_str: |
    MY_VAR :=
        SOME_VALUE;
  configs: *assignment_trailing

assignment_operator_trailing_fails_leading:
  # := at start of second line must be moved to end of first line
  fail_str: |
    MY_VAR
      := SOME_VALUE;
  fix_str: |
    MY_VAR :=
      SOME_VALUE;
  configs: *assignment_trailing

assignment_operator_trailing_passes_on_own_line:
  # := on its own line (newlines on both sides) is tolerated by plain trailing
  pass_str: |
    MY_VAR
    :=
    SOME_VALUE;
  configs: *assignment_trailing

# --- trailing:attached config (operator MUST be on the end of the prev line) ---

assignment_operator_trailing_attached_passes_same_line:
  # := on the same line as the variable is fine
  pass_str: |
    MY_VAR := SOME_VALUE;
  configs: &assignment_trailing_attached
    layout:
      type:
        assignment_operator:
          line_position: "trailing:attached"
    core:
      dialect: oracle

assignment_operator_trailing_attached_passes_truly_trailing:
  # := at end of first line (before newline) is correct
  pass_str: |
    MY_VAR :=
      SOME_VALUE;
  configs: *assignment_trailing_attached

assignment_operator_trailing_attached_fails_leading:
  # := at start of second line must be moved to end of first line
  fail_str: |
    MY_VAR
      := SOME_VALUE;
  fix_str: |
    MY_VAR :=
      SOME_VALUE;
  configs: *assignment_trailing_attached

assignment_operator_trailing_attached_fails_on_own_line:
  # := on its own line (newlines on both sides) must be moved to end of variable line
  fail_str: |
    MY_VAR
    :=
    SOME_FUNCTION(
      PARAM1,
      PARAM2
    );
  fix_str: |
    MY_VAR :=
    SOME_FUNCTION(
      PARAM1,
      PARAM2
    );
  configs: *assignment_trailing_attached

assignment_operator_trailing_attached_fails_multiline_rhs:
  # := on its own line with a multi-line RHS expression
  fail_str: |
    AUDITINFO
    :=
    AUDITINFO
    || 'SUFFIX';
  fix_str: |
    AUDITINFO :=
    AUDITINFO
    || 'SUFFIX';
  configs: *assignment_trailing_attached

# --- leading config (assignment operator should start the line) ---

assignment_operator_leading_passes_same_line:
  # := on same line as the variable is fine for leading too (mid-line)
  pass_str: |
    MY_VAR := SOME_VALUE;
  configs: &assignment_leading
    layout:
      type:
        assignment_operator:
          line_position: leading
    core:
      dialect: oracle

assignment_operator_leading_passes_truly_leading:
  # := at start of second line is correct for leading
  pass_str: |
    MY_VAR
      := SOME_VALUE;
  configs: *assignment_leading

assignment_operator_leading_fails_trailing:
  # := at end of first line must be moved to start of second line
  fail_str: |
    MY_VAR :=
      SOME_VALUE;
  fix_str: |
    MY_VAR
      := SOME_VALUE;
  configs: *assignment_leading

assignment_operator_leading_passes_on_own_line:
  # := on its own line (newlines on both sides) is ok for leading
  # (it's on a new line, which satisfies the leading constraint)
  pass_str: |
    MY_VAR
    :=
    SOME_VALUE;
  configs: *assignment_leading

# --- leading:attached config (operator MUST start the next line, attached to the RHS) ---

assignment_operator_leading_attached_passes_same_line:
  # := on the same line is fine (mid-line)
  pass_str: |
    MY_VAR := SOME_VALUE;
  configs: &assignment_leading_attached
    layout:
      type:
        assignment_operator:
          line_position: "leading:attached"
    core:
      dialect: oracle

assignment_operator_leading_attached_passes_truly_leading:
  # := at the start of the next line, directly before the RHS - correct
  pass_str: |
    MY_VAR
      := SOME_VALUE;
  configs: *assignment_leading_attached

assignment_operator_leading_attached_fails_trailing:
  # := at end of first line must be moved to start of second line
  fail_str: |
    MY_VAR :=
      SOME_VALUE;
  fix_str: |
    MY_VAR
      := SOME_VALUE;
  configs: *assignment_leading_attached

assignment_operator_leading_attached_fails_on_own_line:
  # := on its own line must be joined to the RHS (remove newline after :=)
  fail_str: |
    MY_VAR
    :=
    SOME_VALUE;
  fix_str: |
    MY_VAR
    := SOME_VALUE;
  configs: *assignment_leading_attached

# --- Cross-dialect: Snowflake scripting (LET statement) ---
# These tests guard that assignment_operator handling is dialect-agnostic.
# Snowflake uses := in LET statements (scripting blocks); the same
# trailing:attached and leading:attached semantics should apply.

assignment_operator_snowflake_trailing_attached_passes:
  # LET var := value on same line is always fine
  pass_str: |
    LET MY_VAR := SOME_VALUE;
  configs: &snowflake_trailing_attached
    layout:
      type:
        assignment_operator:
          line_position: "trailing:attached"
    core:
      dialect: snowflake

assignment_operator_snowflake_trailing_attached_passes_truly_trailing:
  # := at end of line (before newline) is correct for trailing:attached
  pass_str: |
    LET MY_VAR :=
      SOME_VALUE;
  configs: *snowflake_trailing_attached

assignment_operator_snowflake_trailing_attached_fails_standalone:
  # := on its own line must be moved to the end of the LET line
  fail_str: |
    LET MY_VAR
    :=
    SOME_VALUE;
  fix_str: |
    LET MY_VAR :=
    SOME_VALUE;
  configs: *snowflake_trailing_attached

assignment_operator_snowflake_leading_attached_passes:
  # LET var := value on same line is always fine
  pass_str: |
    LET MY_VAR := SOME_VALUE;
  configs: &snowflake_leading_attached
    layout:
      type:
        assignment_operator:
          line_position: "leading:attached"
    core:
      dialect: snowflake

assignment_operator_snowflake_leading_attached_passes_truly_leading:
  # := at start of next line, directly before the RHS - correct
  pass_str: |
    LET MY_VAR
      := SOME_VALUE;
  configs: *snowflake_leading_attached

assignment_operator_snowflake_leading_attached_fails_standalone:
  # := on its own line must be joined to the RHS (remove newline after :=)
  fail_str: |
    LET MY_VAR
    :=
    SOME_VALUE;
  fix_str: |
    LET MY_VAR
    := SOME_VALUE;
  configs: *snowflake_leading_attached
