rule: CV02

test_pass_coalesce:
  pass_str: |
    SELECT coalesce(foo, 0) AS bar,
    FROM baz;

test_pass_qualified_udf:
  # A qualified name is a user-defined function, not the builtin NVL.
  pass_str: |
    SELECT myschema.nvl(foo, 0) AS bar,
    FROM baz;

test_fail_ifnull:
  fail_str: |
    SELECT ifnull(foo, 0) AS bar,
    FROM baz;
  fix_str: |
    SELECT COALESCE(foo, 0) AS bar,
    FROM baz;

test_fail_nvl:
  fail_str: |
    SELECT nvl(foo, 0) AS bar,
    FROM baz;
  fix_str: |
    SELECT COALESCE(foo, 0) AS bar,
    FROM baz;
