    GO

    SELECT 2

    GO'
  dialect: tsql
  pins: Batch separators.
tsql_go_soup:
  sql: GO GO GO
  dialect: tsql
  pins: Batch separators with no batches.
bigquery_typed_struct:
  sql: SELECT STRUCT<a INT64>(1)
  dialect: bigquery
  pins: Typed struct constructor.
bigquery_typed_struct_unclosed:
  sql: SELECT STRUCT<a INT64(1)
  dialect: bigquery
  xfail:
    python_vs_rust: "Same known gap as error_messages.yml:sequence_found_message_no_trailing_period: Rust appends a trailing period to 'Found <...>.' that Python's format doesn't have."
  pins: Typed struct with unclosed angle bracket.
snowflake_stage_and_positional:
  sql: SELECT $1, $2 FROM @stage
  dialect: snowflake
  pins: Stage references and positional columns.
postgres_unclosed_dollar_quote:
