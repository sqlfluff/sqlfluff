# Parity test cases - data for test/core/parser/parity/cases_test.py.
# See test/fixtures/parity/README.md for the schema and strictness contract.
#
# Malformed / no-code / torture inputs outside the well-formed dialect corpus,
# swept across the native-vs-legacy build-path pair (each pins names the
# specific edge shape covered).

unclosed_bracket_raises:
  sql: SELECT (1 + 2
  pins: Unclosed bracket raising SQLParseError.
dangling_binary_operator:
  sql: SELECT 1 +
  pins: Partial expression wrapped as unparsable.
bare_select:
  sql: SELECT
  pins: Single-keyword partial statement.
bare_from:
  sql: FROM t
  pins: Statement starting mid-grammar.
pure_token_soup:
  sql: '!!!! ???'
  pins: Fully unparsable input.
soup_between_statements:
  sql: SELECT 1; !!!! ; SELECT 2
  pins: Unparsable statement between parsable ones.
empty_file:
  sql: ''
  pins: Empty input (early-return path).
whitespace_only:
  sql: "   \n\t\n"
  pins: Whitespace-only input.
comment_only:
  sql: '-- just a comment

    '
  pins: Comment-only input.
lone_semicolon:
  sql: ;
  pins: Single statement terminator.
semicolons_only:
  sql: ;;;
  pins: Empty statements.
trailing_trivia_after_statement:
  sql: "SELECT 1   \n-- comment\n   "
  pins: Trailing non-code kept outside any unparsable wrap.
comments_interleaved:
  sql: /* c */ SELECT /* c2 */ 1 /* c3 */
  pins: Block comments interleaved with code.
empty_function_call:
  sql: SELECT count() FROM t
  pins: Zero-length bracket content (function args).
empty_insert_columns_and_values:
  sql: INSERT INTO t () VALUES ()
  pins: Zero-length bracket content (insert).
empty_over_clause:
  sql: SELECT rank() OVER () FROM t
  pins: Zero-length bracket content (window).
empty_cte_body:
  sql: WITH a AS () SELECT 1
  pins: Zero-length bracket content (CTE).
empty_cast_type:
  sql: SELECT CAST(a AS ) FROM t
  pins: Missing element inside brackets.
empty_values_tuple:
  sql: VALUES ()
  pins: Zero-length bracket content (values).
empty_select_parens:
  sql: SELECT ()
  pins: Empty parenthesised expression.
empty_from_subquery:
  sql: SELECT * FROM ()
  pins: Empty subquery brackets.
empty_create_table_columns:
  sql: CREATE TABLE t ()
  pins: Empty column definition list.
crlf_line_endings:
  sql: "SELECT a,\r\n b\r\nFROM t\r\n"
  pins: CRLF newlines in position accounting.
bare_cr_line_ending:
  sql: "SELECT 1\rFROM t"
  pins: Bare carriage return.
unicode_identifiers:
  sql: SELECT "héllo", "日本語" FROM t
  pins: Multi-byte identifiers.
emoji_literal:
  sql: SELECT '🔥💥' FROM t
  pins: Astral-plane characters in literals.
