    python_vs_rust: "Same known gap as error_messages.yml:sequence_found_message_no_trailing_period: Rust appends a trailing period to 'Found <...>.' that Python's format doesn't have."
  pins: Partially-matching middle statement.
tsql_multi_batch_bad_middle:
  sql: 'SELECT 1

    GO

    TOTALLY BAD )

    GO

    SELECT 2'
  dialect: tsql
  pins: Bad batch between good batches.
bigquery_multi_statement_bad_middle:
  sql: SELECT 1; SELECT STRUCT<a INT64(1); SELECT 2;
  dialect: bigquery
  xfail:
    python_vs_rust: "Same known gap as error_messages.yml:sequence_found_message_no_trailing_period: Rust appends a trailing period to 'Found <...>.' that Python's format doesn't have."
  pins: Unclosed struct in middle statement.
snowflake_multi_statement_stray_exclude_bracket:
  sql: SELECT 1; SELECT 1 -} FROM t; SELECT 2;
  dialect: snowflake
  pins: Stray dialect bracket in middle statement.
  xfail:
    python_vs_rust: "Known gap: greedy_match's stray-closing-bracket check (sqlfluffrs_parser/src/parser/table_driven/match_algorithms.rs)
      recognises brackets by a hardcoded raw-text match on ASCII brackets, while
      Python's next_ex_bracket_match looks up the dialect's bracket_pairs set -
      so it misses dialect-specific brackets such as snowflake's MATCH_RECOGNIZE
      exclude bracket '-}' and keeps scanning instead of aborting the terminator
      search. Fixing it means threading the dialect's bracket set through greedy_match.
      (Multi-statement site of bracket_recovery.yml:stray_closing_bracket_dialect_bracket_set.)"
oracle_multi_statement_bad_middle:
  sql: SELECT 1 FROM dual; BAD BAD (; SELECT 2 FROM dual;
  dialect: oracle
  pins: Garbage with unclosed bracket mid-file.
clickhouse_multi_statement_bad_middle:
  sql: SELECT 1; [[; SELECT 2;
  dialect: clickhouse
  pins: Unclosed square brackets mid-file.
redshift_multi_statement_bad_middle:
  sql: SELECT 1; (((; SELECT 2;
  dialect: redshift
  pins: Unclosed round brackets mid-file.
tsql_cast_structure:
  sql: select CAST(0X0 uniqueidentifier);
  dialect: tsql
  xfail:
    python_vs_rust: 'Known rust-core gap: structural divergence - Python parses the
      malformed CAST content as column_reference, Rust as function.'
  pins: Structural divergence in malformed CAST content - Python parses it as
    column_reference, Rust as function.
