# Create and push Docker images of latest release to DockerHub.
name: Publish SQLFluff DockerHub Version
on:
  release:
    types:
      - published
  workflow_dispatch:

env:
  PROD_IMAGE: dhi.io/python:3.14-debian13
  BASE_IMAGE: dhi.io/python:3.14-debian13-dev

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: production
            target: prod
            cache_tag: latest
            suffix: ""
            test_label: production
          - name: development
            target: dev
            cache_tag: latest-dev
            suffix: -dev
            test_label: development
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      # Get the version of latest release in
      # order to tag published Docker image.
      - name: Get latest release name
        id: latest_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: ${{ github.repository }}

      # Setup QEMU and Buildx to allow for multi-platform builds.
      - name: Set up QEMU
        id: docker_qemu
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        id: docker_buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate with DockerHub.
      - name: Login to DockerHub
        id: docker_login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Authenticate with dhi.io to pull Docker Hardened Images.
      - name: Login to dhi.io
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Authenticate with Container registry
      - name: Login to Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build amd64 image to use in the integration test.
      - name: Build and export ${{ matrix.name }} image to Docker
        id: docker_build_test
        uses: docker/build-push-action@v6
        with:
          load: true
          file: Dockerfile
          target: ${{ matrix.target }}
          build-args: |
            PROD_IMAGE=${{ env.PROD_IMAGE }}
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sqlfluff:test${{ matrix.suffix }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/sqlfluff:${{ matrix.cache_tag }}
          cache-to: type=inline

      # Integration test to validate the image is working.
      - name: Test ${{ matrix.test_label }} Docker image
        id: docker_test
        env:
          TEST_TAG: ${{ secrets.DOCKERHUB_USERNAME }}/sqlfluff:test${{ matrix.suffix }}
        run: |
          echo "SELECT 1" > test.sql
          docker run --rm -i -v $PWD:/sql "$TEST_TAG" lint --dialect ansi /sql/test.sql

      # Build and push image to DockerHub and GHCR.
      # N.B. We tag each image as both latest and with its version number.
      - name: Build and push (${{ matrix.name }} image)
        id: docker_build_push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: Dockerfile
          target: ${{ matrix.target }}
          build-args: |
            PROD_IMAGE=${{ env.PROD_IMAGE }}
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sqlfluff:latest${{ matrix.suffix }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sqlfluff:${{ steps.latest_release.outputs.release }}${{ matrix.suffix }}
            ghcr.io/${{ github.repository }}:latest${{ matrix.suffix }}
            ghcr.io/${{ github.repository }}:${{ steps.latest_release.outputs.release }}${{ matrix.suffix }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/sqlfluff:${{ matrix.cache_tag }}
          cache-to: type=inline

      # Add artifact attestation for GHCR image.
      - name: Generate artifact attestation (${{ matrix.name }})
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.docker_build_push.outputs.digest }}
          push-to-registry: true