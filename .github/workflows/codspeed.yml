##############################
## CodSpeed Benchmarks      ##
##############################
#
# Benchmark of the Rust-backed parser against the TPC-H and TPC-DS query
# suites (test/test_codspeed_tpc_parse.py), instrumented and uploaded via
# CodSpeed. Runs on every push and pull request, and can also be triggered
# manually from the Actions tab.
#
name: CodSpeed Benchmarks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  benchmarks:
    # Skip fork pull requests: they don't have access to secrets.CODSPEED_TOKEN.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements_dev.txt
            pyproject.toml
            constraints/*.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "sqlfluffrs"
          cache-on-failure: true

      - name: Cache downloaded TPC fixtures
        # Keep this key's suffix in sync with _DORIS_SHA in
        # test/test_codspeed_tpc_parse.py.
        uses: actions/cache@v4
        with:
          path: test/.cache/tpc
          key: tpc-fixtures-3a2d9d55f1e8e2d74187179ef89c36c8562815fd

      - name: Install dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system -r requirements_dev.txt
          uv pip install --system maturin

      - name: Generate Rust dialect files
        run: python utils/rustify.py build

      - name: Build and install the Rust extension (release)
        run: |
          maturin build --release --out dist --manifest-path sqlfluffrs/Cargo.toml
          python -m pip install --force-reinstall --no-deps --no-index --find-links=dist sqlfluffrs

      - name: Run CodSpeed benchmarks
        # v4+ is required for the "memory" mode and for combining multiple
        # modes in one run. Walltime mode is most reliable on CodSpeed
        # Hosted Macro Runners (runs-on: codspeed-macro); on a standard
        # ubuntu-latest runner it still works but its numbers are noisier
        # than the simulation/memory instruments.
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation,walltime,memory
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: pytest test/test_codspeed_tpc_parse.py --codspeed
