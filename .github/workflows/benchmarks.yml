################################
## Performance Benchmarks      ##
################################
#
# Manually triggered workflow that benchmarks a specific commit.
#
# Key design principle
# ─────────────────────
# Two concerns are kept strictly separate:
#
#   • Benchmark infrastructure (test files, build.rs, this workflow)
#     → always taken from the HEAD of this workflow's branch.
#
#   • Library under test (Python package, Rust source to compile)
#     → taken from commit_sha.
#
# This means the benchmarks can be run against any old commit, even ones that
# pre-date the test files or the shared .cache fixture path.
#
# Usage (GitHub UI → Actions → Performance Benchmarks → Run workflow):
#   commit_sha: the full or abbreviated SHA to benchmark, e.g. "abc1234"
#
# Job graph:
#
#   fetch-tpc-fixtures   python-bench-prepare    setup-bench-matrix
#   (uploads artifact)   (builds venv, caches)   (emits runner IDs)
#          │                    │                  │        │
#          └──────────┬─────────┘                  │        │
#                     ├────────────────────────────┘        │
#                     │                        ┌────────────┘
#                     ▼                        ▼
#        python-walltime-bench     python-bench (max_parallel runners,
#        (1 job, all               each a round-robin slice of all
#         max_queries × 4          (4×max_queries) combinations):
#         combinations,              runner 0: combos 0, 20, 40, …
#         no Valgrind)               runner 1: combos 1, 21, 41, …
#                     │              …
#                     │              runner N-1: combos N-1, 2N-1, …
#                     │                        │
#                     └────────────┬───────────┘
#                                  │         rust-tpc-benchmarks
#                                  │         (single job, all 4 groups)
#                                  ├──────────────────────────────────┘
#                                  ▼
#                           bench-summary
#                           (aggregates all stats)
#
# Python benchmarks run in two passes:
#   1. Instruction + memory (callgrind + massif via python-bench): Valgrind
#      callgrind with --instr-atstart=yes counts all instructions; massif
#      records peak heap.  pytest-codspeed disabled; --benchmark-disable
#      prevents timing so each function runs exactly once.
#   2. Wall time (python-walltime-bench): pytest-benchmark native timing with
#      no Valgrind, multiple rounds per query, reports median ms.  Limited to
#      max_queries × 4 combinations (one job, no round-robin fan-out).
#
# Rust benchmarks use iai-callgrind, which manages Valgrind internally and
# produces per-function instruction counts with setup code excluded from
# measurement.  The iai-callgrind-runner binary must be installed at a version
# that exactly matches the iai-callgrind library in Cargo.toml; the install
# step extracts the resolved version from `cargo metadata` automatically.
#
# A bench-summary job downloads all per-job stat artifacts and prints a
# combined report at the end of the workflow.
#
name: Performance Benchmarks

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to check out and benchmark'
        required: true
        type: string
      max_parallel:
        description: 'Maximum number of Python benchmark jobs to run concurrently (Rust jobs add ~5 more)'
        required: false
        type: string
        default: '19'
      max_queries:
        description: 'Number of queries to run per benchmark (Q0–Q{N-1}) for all four TPC suites'
        required: false
        type: string
        default: '20'

concurrency:
  group: benchmarks-${{ inputs.commit_sha }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Fetch TPC-H (22 queries) and TPC-DS (99 queries) via the Rust build script
  # on this branch.  Always runs against the workflow branch HEAD — never the
  # target SHA — so build.rs is always the version that writes to
  # .cache/tpc-fixtures/ (the shared location).
  # ─────────────────────────────────────────────────────────────────────────────
  fetch-tpc-fixtures:
    name: Fetch TPC fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements_dev.txt
            pyproject.toml
            constraints/*.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "sqlfluffrs"
          cache-on-failure: true

      - name: Generate Rust dialect files
        run: |
          uv pip install --system -e .
          python utils/rustify.py build

      - name: Fetch TPC fixtures
        working-directory: sqlfluffrs
        run: cargo build -p sqlfluffrs_benchmarks --features fetch

      - name: Upload TPC fixtures artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpc-fixtures
          path: .cache/tpc-fixtures/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Python benchmark environment — built once into a venv, cached by commit SHA,
  # and restored by every fan-out job so none of them pay installation cost.
  # Runs in parallel with fetch-tpc-fixtures (no shared dependency).
  # ─────────────────────────────────────────────────────────────────────────────
  python-bench-prepare:
    name: Prepare Python benchmark environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow branch (benchmark infrastructure)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout target commit (library under test)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
          path: target-sqlfluff
          fetch-depth: 1

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache benchmark virtual environment
        id: cache-bench-venv
        uses: actions/cache@v4
        with:
          path: .bench-venv
          key: bench-venv-${{ runner.os }}-py3.14-${{ inputs.commit_sha }}

      - name: Build virtual environment
        if: steps.cache-bench-venv.outputs.cache-hit != 'true'
        run: |
          uv venv .bench-venv
          uv pip install --python .bench-venv/bin/python \
            ./target-sqlfluff \
            pytest pytest-codspeed pytest-benchmark

  # ─────────────────────────────────────────────────────────────────────────────
  # Emit {"runner_id": [0, 1, ..., max_parallel-1]} so python-bench can use a
  # dynamic matrix sized exactly to the requested parallelism.
  # ─────────────────────────────────────────────────────────────────────────────
  setup-bench-matrix:
    name: Generate runner matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Generate runner IDs
        id: gen
        run: |
          matrix=$(python3 -c "import json; print(json.dumps({'runner_id': list(range(${{ inputs.max_parallel }}))}))")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # Python benchmarks — max_parallel runners, each assigned a round-robin slice
  # of all (4 × max_queries) combinations.  Combinations are ordered as:
  #   lex_tpch Q0–Q{N-1}, parse_tpch Q0–Q{N-1}, lex_tpcds Q0–Q{N-1}, parse_tpcds Q0–Q{N-1}
  # Runner r handles indices r, r+max_parallel, r+2×max_parallel, …  running
  # them sequentially.  Every runner carries ~equal total work so all finish
  # at roughly the same time with no straggler holding back the group.
  # ─────────────────────────────────────────────────────────────────────────────
  python-bench:
    name: Python bench runner ${{ matrix.runner_id }}
    runs-on: ubuntu-latest
    needs: [setup-bench-matrix, fetch-tpc-fixtures, python-bench-prepare]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-bench-matrix.outputs.matrix) }}

    steps:
      - name: Checkout workflow branch (benchmark infrastructure)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download TPC fixtures
        uses: actions/download-artifact@v4
        with:
          name: tpc-fixtures
          path: .cache/tpc-fixtures/

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Restore benchmark virtual environment
        uses: actions/cache/restore@v4
        with:
          path: .bench-venv
          key: bench-venv-${{ runner.os }}-py3.14-${{ inputs.commit_sha }}
          fail-on-cache-miss: true

      - name: Install Valgrind
        run: sudo apt-get update -q && sudo apt-get install -y valgrind

      - name: Run assigned benchmark batch
        run: |
          mkdir -p /tmp/bench-stats

          # Build ordered list of all (benchmark, query_idx) combinations.
          declare -a combos
          for bench in test_lex_tpch test_parse_tpch test_lex_tpcds test_parse_tpcds; do
            max_q=$(( ${{ inputs.max_queries }} - 1 ))
            for ((q=0; q<=max_q; q++)); do combos+=("${bench}:${q}"); done
          done

          runner_id=${{ matrix.runner_id }}
          max_parallel=${{ inputs.max_parallel }}

          for ((i=runner_id; i<${#combos[@]}; i+=max_parallel)); do
            bench="${combos[$i]%%:*}"
            qidx="${combos[$i]##*:}"

            echo "━━━ $bench Q$qidx ━━━"
            mkdir -p /tmp/callgrind
            unset TPCH_QUERY_IDX TPCDS_QUERY_IDX
            if [[ "$bench" == *tpcds* ]]; then
              export TPCDS_QUERY_IDX=$qidx
            else
              export TPCH_QUERY_IDX=$qidx
            fi

            PYTHONHASHSEED=0 PYTHONMALLOC=malloc \
            valgrind -q \
              --tool=callgrind \
              --callgrind-out-file=/tmp/callgrind/callgrind.out \
              --combine-dumps=yes \
              --dump-line=no \
              .bench-venv/bin/python -m pytest test/benchmarks/ \
                -k "$bench" -v --benchmark-disable -p no:codspeed \
              || echo "::warning::$bench Q$qidx failed, continuing"

            {
              echo "Benchmark: $bench Q$qidx"
              awk '/^summary:/ { printf "Instructions: %'"'"'d\n", $2 }' \
                /tmp/callgrind/callgrind.out
            } | tee "/tmp/bench-stats/python-${bench}-q${qidx}.txt"
            echo "──────────────────────────────────────"

            # Also collect peak heap bytes via massif.
            echo "━━━ $bench Q$qidx (mem) ━━━"
            mkdir -p /tmp/massif
            unset TPCH_QUERY_IDX TPCDS_QUERY_IDX
            if [[ "$bench" == *tpcds* ]]; then
              export TPCDS_QUERY_IDX=$qidx
            else
              export TPCH_QUERY_IDX=$qidx
            fi
            PYTHONHASHSEED=0 PYTHONMALLOC=malloc \
            valgrind -q \
              --tool=massif \
              --massif-out-file=/tmp/massif/massif.out \
              --pages-as-heap=no \
              .bench-venv/bin/python -m pytest test/benchmarks/ \
                -k "$bench" -v --benchmark-disable -p no:codspeed \
              || echo "::warning::$bench Q$qidx mem failed, continuing"
            {
              echo "Benchmark: $bench Q$qidx (peak heap)"
              peak=$(grep '^mem_heap_B=' /tmp/massif/massif.out | cut -d= -f2 | sort -n | tail -1)
              awk -v n="${peak:-0}" 'BEGIN { printf "Peak heap B: %'"'"'d\n", n }'
            } | tee "/tmp/bench-stats/python-mem-${bench}-q${qidx}.txt"
            echo "──────────────────────────────────────"
          done

      - name: Upload bench stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-stats-python-runner-${{ matrix.runner_id }}
          path: /tmp/bench-stats/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Rust tpc_bench — all four benchmark groups in a single job, iai-callgrind.
  #
  # Each group benchmarks one query (controlled by TPCH_QUERY_IDX /
  # TPCDS_QUERY_IDX env vars; defaults to Q13 for TPC-H and Q1 for TPC-DS).
  # Running without a filter avoids iai-callgrind filter-matching surprises:
  # group IDs have the form group::function::bench_id and a bare group-name
  # substring may not match in all versions.  The combined output is split into
  # per-group files (rust-{bench}.txt) so bench-summary can parse each column.
  #
  # The Rust source to compile comes from commit_sha.  The entire
  # sqlfluffrs_benchmarks crate and workspace Cargo.toml are overlaid from the
  # workflow branch so that benchmark infrastructure is always current regardless
  # of the target commit age.
  # ─────────────────────────────────────────────────────────────────────────────
  rust-tpc-benchmarks:
    name: Rust – TPC benchmarks (iai-callgrind)
    runs-on: ubuntu-latest
    needs: fetch-tpc-fixtures

    steps:
      - name: Checkout target commit (Rust source under test)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 1

      - name: Overlay benchmark infrastructure from workflow branch
        run: |
          git fetch origin ${{ github.ref_name }} --depth=1
          git checkout FETCH_HEAD -- \
            sqlfluffrs/Cargo.toml \
            sqlfluffrs/sqlfluffrs_benchmarks/

      - name: Download TPC fixtures
        uses: actions/download-artifact@v4
        with:
          name: tpc-fixtures
          path: .cache/tpc-fixtures/

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements_dev.txt
            pyproject.toml
            constraints/*.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "sqlfluffrs"
          cache-on-failure: true

      - name: Generate Rust dialect files
        run: |
          uv pip install --system -e .
          python utils/rustify.py build

      - name: Install Valgrind
        run: sudo apt-get update -q && sudo apt-get install -y valgrind

      - name: Detect iai-callgrind version
        id: iai
        working-directory: sqlfluffrs
        run: |
          version=$(cargo metadata --format-version 1 \
            | python3 -c "import sys,json; m=json.load(sys.stdin); \
              print(next((p['version'] for p in m['packages'] if p['name']=='iai-callgrind'), ''))")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install iai-callgrind-runner
        if: steps.iai.outputs.version != ''
        working-directory: sqlfluffrs
        run: cargo install iai-callgrind-runner --version "${{ steps.iai.outputs.version }}"

      - name: Verify iai-callgrind-runner is available
        if: steps.iai.outputs.version != ''
        run: |
          which iai-callgrind-runner && iai-callgrind-runner --version \
            || echo "::warning::iai-callgrind-runner not found in PATH"

      - name: Run TPC benchmarks (all groups)
        if: steps.iai.outputs.version != ''
        working-directory: sqlfluffrs
        run: |
          mkdir -p /tmp/bench-stats
          cargo bench -p sqlfluffrs_benchmarks --bench tpc_bench \
            2>&1 | tee /tmp/bench-stats/rust-tpc-all.txt
          # Split combined output into per-group files for bench-summary
          python3 << 'PYEOF'
          import re, pathlib
          src = pathlib.Path('/tmp/bench-stats/rust-tpc-all.txt').read_text()
          out = pathlib.Path('/tmp/bench-stats')
          groups = ['lex_tpch', 'parse_tpch', 'lex_tpcds', 'parse_tpcds']
          pat = re.compile(
              r'^(bench_(?:' + '|'.join(groups) + r'))\b',
              re.MULTILINE,
          )
          bs = [(m.start(), m.group(1)[len('bench_'):]) for m in pat.finditer(src)]
          for i, (start, group) in enumerate(bs):
              end = bs[i + 1][0] if i + 1 < len(bs) else len(src)
              (out / f'rust-{group}.txt').write_text(src[start:end])
              print(f'rust-{group}.txt: {end - start} bytes')
          if not bs:
              print('::warning::No iai-callgrind group sections found in output')
          PYEOF

      - name: Upload bench stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-stats-rust-tpc
          path: /tmp/bench-stats/rust-*.txt
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Python wall-time benchmarks — pytest-benchmark, no Valgrind.
  #
  # Runs all (4 × max_queries) (benchmark × query) combinations in a single
  # job without any Valgrind overhead.  pytest-benchmark records median, mean,
  # and min wall-clock time over multiple rounds and writes a JSON artifact;
  # this step converts each JSON to a simple text file parseable by bench-summary.
  #
  # Runs in parallel with python-bench and rust-tpc-benchmarks.
  # ─────────────────────────────────────────────────────────────────────────────
  python-walltime-bench:
    name: Python – wall-time benchmarks
    runs-on: ubuntu-latest
    needs: [fetch-tpc-fixtures, python-bench-prepare]

    steps:
      - name: Checkout workflow branch (benchmark infrastructure)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Download TPC fixtures
        uses: actions/download-artifact@v4
        with:
          name: tpc-fixtures
          path: .cache/tpc-fixtures/

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Restore benchmark virtual environment
        uses: actions/cache/restore@v4
        with:
          path: .bench-venv
          key: bench-venv-${{ runner.os }}-py3.14-${{ inputs.commit_sha }}
          fail-on-cache-miss: true

      - name: Run wall-time benchmark batch
        run: |
          mkdir -p /tmp/bench-stats

          # JSON-to-text converter — written once, called per (bench, query).
          cat > /tmp/wt_convert.py << 'PYEOF'
          import json, sys, pathlib
          bench, q = sys.argv[1], sys.argv[2]
          f = pathlib.Path(f'/tmp/bench-stats/python-walltime-{bench}-q{q}.json')
          if not f.exists():
              sys.exit(0)
          data = json.loads(f.read_text())
          if not data.get('benchmarks'):
              sys.exit(0)
          s = data['benchmarks'][0]['stats']
          print(f'Benchmark: {bench} Q{q} (wall time)')
          print(f'Median ms: {s["median"] * 1000:.3f}')
          print(f'Mean ms: {s["mean"] * 1000:.3f}')
          print(f'Min ms: {s["min"] * 1000:.3f}')
          print(f'Rounds: {s["rounds"]}')
          PYEOF

          for bench in test_lex_tpch test_parse_tpch test_lex_tpcds test_parse_tpcds; do
            max_q=$(( ${{ inputs.max_queries }} - 1 ))
            for ((q=0; q<=max_q; q++)); do
              echo "━━━ $bench Q$q (wall time) ━━━"
              unset TPCH_QUERY_IDX TPCDS_QUERY_IDX
              if [[ "$bench" == *tpcds* ]]; then
                export TPCDS_QUERY_IDX=$q
              else
                export TPCH_QUERY_IDX=$q
              fi
              PYTHONHASHSEED=0 \
              .bench-venv/bin/python -m pytest test/benchmarks/ \
                -k "$bench" -v \
                --benchmark-json=/tmp/bench-stats/python-walltime-${bench}-q${q}.json \
                || echo "::warning::$bench Q$q walltime failed, continuing"
              python3 /tmp/wt_convert.py "$bench" "$q" \
                | tee /tmp/bench-stats/python-walltime-${bench}-q${q}.txt || true
              echo "──────────────────────────────────────"
            done
          done

      - name: Upload bench stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-stats-python-walltime
          path: /tmp/bench-stats/python-walltime-*.txt
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Aggregate all per-job stat artifacts into a single summary.
  # Runs even if individual bench jobs fail (if: always()).
  # ─────────────────────────────────────────────────────────────────────────────
  bench-summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [python-bench, python-walltime-bench, rust-tpc-benchmarks]
    if: always()

    steps:
      - name: Download all benchmark stats
        uses: actions/download-artifact@v4
        with:
          pattern: bench-stats-*
          merge-multiple: true
          path: bench-stats/

      - name: Print summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          benchmarks=(test_lex_tpch test_parse_tpch test_lex_tpcds test_parse_tpcds)

          # ── Fetch commit metadata ─────────────────────────────────────
          commit_json=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ inputs.commit_sha }}" \
            || echo '{}')
          commit_sha=$(printf '%s' "$commit_json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha','${{ inputs.commit_sha }}'))")
          commit_ts=$(printf '%s' "$commit_json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('commit',{}).get('author',{}).get('date','—'))")
          commit_subject=$(printf '%s' "$commit_json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('commit',{}).get('message','—') or '—').splitlines()[0])")

          # ── Markdown commit header → GitHub Step Summary ──────────────
          {
            echo "## Benchmark run"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Commit** | \`${commit_sha}\` |"
            echo "| **Timestamp** | ${commit_ts} |"
            echo "| **Subject** | ${commit_subject} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Plain-text commit header → log ────────────────────────────
          echo "═══════════════════════════════════════════════════════════════"
          printf "Commit:    %s\n" "$commit_sha"
          printf "Timestamp: %s\n" "$commit_ts"
          printf "Subject:   %s\n" "$commit_subject"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""

          # Parse Python stat files into associative array keyed by "bench|query"
          declare -A data
          for f in bench-stats/python-test_*-q*.txt; do
            base=$(basename "$f" .txt)          # python-test_lex_tpch-q0
            bench="${base#python-}"              # test_lex_tpch-q0
            q="${bench##*-q}"                    # 0
            bench="${bench%-q*}"                 # test_lex_tpch
            instr=$(grep '^Instructions:' "$f" | awk '{print $2}') || instr=""
            data["${bench}|${q}"]="${instr:-—}"
          done

          # Determine query range from keys present in data
          qs=()
          for key in "${!data[@]}"; do qs+=("${key##*|}"); done
          mapfile -t qs < <(printf '%s\n' "${qs[@]}" | sort -un)

          # ── Markdown table → GitHub Step Summary ──────────────────────
          {
            echo "## Python Benchmark Results (instructions)"
            echo ""
            echo "Counts the total CPU instructions executed per benchmark run under Valgrind callgrind. Deterministic and noise-free: unaffected by CPU speed or system load, so differences across commits reflect code-path changes, not environment variance."
            echo ""
            echo "| Q | lex_tpch | parse_tpch | lex_tpcds | parse_tpcds |"
            echo "|---|----------|------------|-----------|-------------|"
            for q in "${qs[@]}"; do
              printf "| %s" "$q"
              for b in "${benchmarks[@]}"; do
                printf " | %s" "${data[${b}|${q}]:-—}"
              done
              echo " |"
            done
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── Plain-text instructions table → log ───────────────────────
          W=13
          echo "═══════════════════════════════════════════════════════════════"
          echo "                  Instructions (callgrind)"
          echo "───────────────────────────────────────────────────────────────"
          printf "%-3s  %-${W}s %-${W}s %-${W}s %-${W}s\n" \
            "Q" "lex_tpch" "parse_tpch" "lex_tpcds" "parse_tpcds"
          echo "───────────────────────────────────────────────────────────────"
          for q in "${qs[@]}"; do
            printf "%-3s  %-${W}s %-${W}s %-${W}s %-${W}s\n" \
              "$q" \
              "${data[test_lex_tpch|${q}]:-—}" \
              "${data[test_parse_tpch|${q}]:-—}" \
              "${data[test_lex_tpcds|${q}]:-—}" \
              "${data[test_parse_tpcds|${q}]:-—}"
          done
          echo "═══════════════════════════════════════════════════════════════"

          # ── Parse Python memory stat files ────────────────────────────
          declare -A mem_data
          for f in bench-stats/python-mem-test_*-q*.txt; do
            base=$(basename "$f" .txt)          # python-mem-test_lex_tpch-q0
            bench="${base#python-mem-}"          # test_lex_tpch-q0
            q="${bench##*-q}"                    # 0
            bench="${bench%-q*}"                 # test_lex_tpch
            peak=$(grep '^Peak heap B:' "$f" | awk '{print $NF}') || peak=""
            mem_data["${bench}|${q}"]="${peak:-—}"
          done

          mem_qs=()
          for key in "${!mem_data[@]}"; do mem_qs+=("${key##*|}"); done
          mapfile -t mem_qs < <(printf '%s\n' "${mem_qs[@]}" | sort -un)

          if [[ ${#mem_qs[@]} -gt 0 ]]; then
            # ── Markdown memory table → GitHub Step Summary ──────────────
            {
              echo "## Python Benchmark Results (peak heap bytes)"
              echo ""
              echo "Peak heap allocation observed during the run, collected with Valgrind massif. Use this to track whether a change grows or shrinks the high-water mark of live heap memory while lexing or parsing a query."
              echo ""
              echo "| Q | lex_tpch | parse_tpch | lex_tpcds | parse_tpcds |"
              echo "|---|----------|------------|-----------|-------------|"
              for q in "${mem_qs[@]}"; do
                printf "| %s" "$q"
                for b in "${benchmarks[@]}"; do
                  printf " | %s" "${mem_data[${b}|${q}]:-—}"
                done
                echo " |"
              done
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            # ── Plain-text memory table → log ────────────────────────────
            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "                  Peak heap bytes (massif)"
            echo "───────────────────────────────────────────────────────────────"
            printf "%-3s  %-${W}s %-${W}s %-${W}s %-${W}s\n" \
              "Q" "lex_tpch" "parse_tpch" "lex_tpcds" "parse_tpcds"
            echo "───────────────────────────────────────────────────────────────"
            for q in "${mem_qs[@]}"; do
              printf "%-3s  %-${W}s %-${W}s %-${W}s %-${W}s\n" \
                "$q" \
                "${mem_data[test_lex_tpch|${q}]:-—}" \
                "${mem_data[test_parse_tpch|${q}]:-—}" \
                "${mem_data[test_lex_tpcds|${q}]:-—}" \
                "${mem_data[test_parse_tpcds|${q}]:-—}"
            done
            echo "═══════════════════════════════════════════════════════════════"
          fi

          # ── Parse Python wall-time stat files ────────────────────
          declare -A wt_data
          for f in bench-stats/python-walltime-test_*-q*.txt; do
            base=$(basename "$f" .txt)          # python-walltime-test_lex_tpch-q0
            bench="${base#python-walltime-}"    # test_lex_tpch-q0
            q="${bench##*-q}"                   # 0
            bench="${bench%-q*}"                # test_lex_tpch
            median=$(grep '^Median ms:' "$f" | awk '{print $NF}') || median=""
            wt_data["${bench}|${q}"]="${median:-—}"
          done

          wt_qs=()
          for key in "${!wt_data[@]}"; do wt_qs+=("${key##*|}"); done
          mapfile -t wt_qs < <(printf '%s\n' "${wt_qs[@]}" | sort -un)

          if [[ ${#wt_qs[@]} -gt 0 ]]; then
            # ── Markdown wall-time table → GitHub Step Summary ────────
            {
              echo "## Python Benchmark Results (wall time, ms)"
              echo ""
              echo "Median wall-clock time per call (milliseconds), measured by pytest-benchmark running natively without Valgrind. Affected by machine load and CPU state — use for order-of-magnitude comparisons; prefer instruction counts for regression detection."
              echo ""
              echo "| Q | lex_tpch | parse_tpch | lex_tpcds | parse_tpcds |"
              echo "|---|----------|------------|-----------|-------------|"
              for q in "${wt_qs[@]}"; do
                printf "| %s" "$q"
                for b in "${benchmarks[@]}"; do
                  printf " | %s" "${wt_data[${b}|${q}]:-—}"
                done
                echo " |"
              done
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            # ── Plain-text wall-time table → log ─────────────────────
            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "                  Wall time / ms (median)"
            echo "───────────────────────────────────────────────────────────────"
            printf "%-3s  %-${W}s %-${W}s %-${W}s %-${W}s\n" \
              "Q" "lex_tpch" "parse_tpch" "lex_tpcds" "parse_tpcds"
            echo "───────────────────────────────────────────────────────────────"
            for q in "${wt_qs[@]}"; do
              printf "%-3s  %-${W}s %-${W}s %-${W}s %-${W}s\n" \
                "$q" \
                "${wt_data[test_lex_tpch|${q}]:-—}" \
                "${wt_data[test_parse_tpch|${q}]:-—}" \
                "${wt_data[test_lex_tpcds|${q}]:-—}" \
                "${wt_data[test_parse_tpcds|${q}]:-—}"
            done
            echo "═══════════════════════════════════════════════════════════════"
          fi

          # ── Parse Rust TPC stat files ─────────────────────────────
          rust_benchmarks=(lex_tpch parse_tpch lex_tpcds parse_tpcds)
          declare -A rust_data

          parse_iai_metric() {
            grep -m1 "$1" "$2" 2>/dev/null \
              | grep -oE '[0-9][0-9,]*' | head -1 | tr -d ',' || true
          }

          any_rust=false
          for bench in "${rust_benchmarks[@]}"; do
            f="bench-stats/rust-${bench}.txt"
            if [[ -f "$f" ]]; then
              any_rust=true
              rust_data["${bench}|instr"]=$(parse_iai_metric "Instructions:"    "$f")
              rust_data["${bench}|l1"]=$(   parse_iai_metric "L1 Hits:"         "$f")
              rust_data["${bench}|l2"]=$(   parse_iai_metric "L2 Hits:"         "$f")
              rust_data["${bench}|ram"]=$(  parse_iai_metric "RAM Hits:"        "$f")
              rust_data["${bench}|cycles"]=$(parse_iai_metric "Estimated Cycles:" "$f")
            fi
          done

          if $any_rust; then
            rust_metric_labels=("Instructions" "L1 Hits" "L2 Hits" "RAM Hits" "Est. Cycles")
            rust_metric_keys=(instr l1 l2 ram cycles)

            # ── Markdown Rust table → GitHub Step Summary ────────────
            {
              echo "## Rust TPC Benchmark Results (iai-callgrind)"
              echo ""
              echo "Instruction count and cache breakdown for the Rust implementation, measured by iai-callgrind. Setup code (file I/O, tokenisation) runs outside Valgrind instrumentation, so only the benchmark body itself is counted."
              echo ""
              echo "> **Note:** Python instruction counts include interpreter startup, pytest overhead, and fixture loading — not just the benchmark body. Rust counts only the function under test. The two figures are not directly comparable; each is internally consistent for regression tracking within its own language."
              echo ""
              echo "| Metric | lex_tpch | parse_tpch | lex_tpcds | parse_tpcds |"
              echo "|--------|----------|------------|-----------|-------------|"
              for i in "${!rust_metric_labels[@]}"; do
                printf "| %s" "${rust_metric_labels[$i]}"
                for bench in "${rust_benchmarks[@]}"; do
                  printf " | %s" "${rust_data[${bench}|${rust_metric_keys[$i]}]:-—}"
                done
                echo " |"
              done
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            # ── Plain-text Rust table → log ──────────────────────────
            MW=16
            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "             Rust TPC Benchmarks (iai-callgrind)"
            echo "───────────────────────────────────────────────────────────────"
            printf "%-${MW}s %-${W}s %-${W}s %-${W}s %-${W}s\n" \
              "Metric" "lex_tpch" "parse_tpch" "lex_tpcds" "parse_tpcds"
            echo "───────────────────────────────────────────────────────────────"
            for i in "${!rust_metric_labels[@]}"; do
              printf "%-${MW}s %-${W}s %-${W}s %-${W}s %-${W}s\n" \
                "${rust_metric_labels[$i]}" \
                "${rust_data[lex_tpch|${rust_metric_keys[$i]}]:-—}"   \
                "${rust_data[parse_tpch|${rust_metric_keys[$i]}]:-—}" \
                "${rust_data[lex_tpcds|${rust_metric_keys[$i]}]:-—}"  \
                "${rust_data[parse_tpcds|${rust_metric_keys[$i]}]:-—}"
            done
            echo "═══════════════════════════════════════════════════════════════"
          fi
