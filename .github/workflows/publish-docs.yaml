name: Deploy Docs

on:
  push:
    branches:
      - main
      - ac/docsdeploy
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-beta-latest"
  cancel-in-progress: false

env:
  DOCS_SITE_DIR: site
  DOCS_R2_PREFIX: site
  SQLFLUFF_DOCS_BASE: /en/latest/
  SQLFLUFF_DOCS_NOINDEX: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Publish docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: 📦 Enable corepack
        run: corepack enable

      - name: 💾 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docsv/pnpm-lock.yaml

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: 📦 Install SQLFluff
        run: pip install -e .

      - name: 📦 Install docs dependencies
        working-directory: docsv
        run: corepack pnpm install --frozen-lockfile

      - name: ⬇️ Download existing assembled site from R2
        if: ${{ !env.ACT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: >-
          aws s3 sync s3://${{ secrets.R2_BUCKET }}/${{ env.DOCS_R2_PREFIX }} ${{ env.DOCS_SITE_DIR }}
          --only-show-errors
          --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: ⚒️ Build VitePress latest docs
        if: ${{ github.event_name != 'release' }}
        env:
          SQLFLUFF_DOCS_BASE: /en/latest/
          SQLFLUFF_DOCS_NOINDEX: ${{ env.SQLFLUFF_DOCS_NOINDEX }}
        working-directory: docsv
        run: corepack pnpm run docs:build

      - name: Assemble latest site
        if: ${{ github.event_name != 'release' }}
        run: >-
          python docsv/scripts/assemble-site.py
          --vitepress-dist docsv/.vitepress/dist
          --output-dir ${{ env.DOCS_SITE_DIR }}
          --channel latest
          --title Development
          --kind channel

      - name: ⚒️ Build VitePress release docs
        if: ${{ github.event_name == 'release' }}
        env:
          SQLFLUFF_DOCS_BASE: /en/${{ github.event.release.tag_name }}/
          SQLFLUFF_DOCS_NOINDEX: ${{ env.SQLFLUFF_DOCS_NOINDEX }}
        working-directory: docsv
        run: corepack pnpm run docs:build

      - name: Assemble release site
        if: ${{ github.event_name == 'release' }}
        run: >-
          python docsv/scripts/assemble-site.py
          --vitepress-dist docsv/.vitepress/dist
          --output-dir ${{ env.DOCS_SITE_DIR }}
          --channel ${{ github.event.release.tag_name }}
          --title ${{ github.event.release.tag_name }}
          --kind release
          --published-at ${{ github.event.release.published_at }}
          ${{ github.event.release.prerelease && '--prerelease' || '' }}

      - name: ⚒️ Build VitePress stable docs
        if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        env:
          SQLFLUFF_DOCS_BASE: /en/stable/
          SQLFLUFF_DOCS_NOINDEX: ${{ env.SQLFLUFF_DOCS_NOINDEX }}
        working-directory: docsv
        run: corepack pnpm run docs:build

      - name: Assemble stable site
        if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
        run: >-
          python docsv/scripts/assemble-site.py
          --vitepress-dist docsv/.vitepress/dist
          --output-dir ${{ env.DOCS_SITE_DIR }}
          --channel stable
          --title Stable
          --kind channel
          --stable-release ${{ github.event.release.tag_name }}

      - name: ⬆️ Upload assembled site artifact
        uses: actions/upload-artifact@v4
        with:
          name: assembled-docs-site
          path: ${{ env.DOCS_SITE_DIR }}

      - name: Sync assembled site to R2
        if: ${{ !env.ACT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: "true"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: >-
          aws s3 sync ${{ env.DOCS_SITE_DIR }} s3://${{ secrets.R2_BUCKET }}/${{ env.DOCS_R2_PREFIX }}
          --delete
          --only-show-errors
          --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

      - name: Deploy assembled site to Netlify
        if: ${{ !env.ACT }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >-
          npx --yes netlify-cli deploy
          --dir=${{ env.DOCS_SITE_DIR }}
          --prod
          --message "docs publish ${GITHUB_SHA}"
