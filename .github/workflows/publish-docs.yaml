name: Deploy Docs

on:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Enable corepack
        run: |
          corepack enable

      - name: 💾 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: docsv/pnpm-lock.yaml

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v5
        if: ${{ !env.ACT }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: 📦 Install SQLFluff
        run: pip install -e .

      - name: 📦 Install dependencies
        working-directory: docsv
        run: pnpm install --frozen-lockfile

      - name: ⚒️ Build with VitePress
        working-directory: docsv
        run: pnpm run docs:build

      - name: 🔎 Debug generated RF01 section
        working-directory: docsv
        run: |
          python - <<'PY'
          from pathlib import Path

          references_path = Path("reference/rules/references.md")
          content = references_path.read_text()
          start_marker = "## RF01: references.from {#rf01}"
          end_marker = "\n---\n\n## RF02: references.qualification {#rf02}"

          start = content.find(start_marker)
          end = content.find(end_marker, start)

          print("===== GENERATED RF01 SECTION START =====")
          if start == -1:
              print("RF01 section not found in generated references.md")
          else:
              if end == -1:
                  end = len(content)
              print(content[start:end].rstrip())
          print("===== GENERATED RF01 SECTION END =====")
          PY

      - name: ⬆️ Upload artifact
        uses: actions/upload-pages-artifact@v4
        if: ${{ !env.ACT }}
        with:
          path: docsv/.vitepress/dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    name: ✅ Deploy Docs
    steps:
      - name: ✅ Deploy to GitHub Pages
        if: ${{ !env.ACT }}
        id: deployment
        uses: actions/deploy-pages@v4
